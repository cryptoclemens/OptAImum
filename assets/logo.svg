<svg width="220" height="52" viewBox="0 0 220 52" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OptAImum Logo">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Icon: Circular gauge with rising trend -->
  <circle cx="26" cy="26" r="22" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-dasharray="110 30" stroke-dashoffset="22" stroke-linecap="round"/>

  <!-- Trend line inside circle -->
  <polyline points="12,35 18,26 24,20 31,14" stroke="url(#iconGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow tip -->
  <polyline points="27,11 31,14 28,18" stroke="url(#iconGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="12" cy="35" r="2.5" fill="url(#iconGrad)"/>
  <circle cx="24" cy="20" r="2.5" fill="url(#iconGrad)"/>
  <circle cx="31" cy="14" r="2.5" fill="url(#iconGrad)"/>

  <!-- Text: Opt -->
  <text x="58" y="33" font-family="'Segoe UI', Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#0F172A" letter-spacing="-0.5">Opt</text>

  <!-- Text: AI (gradient) -->
  <text x="96" y="33" font-family="'Segoe UI', Inter, system-ui, sans-serif" font-weight="800" font-size="22" fill="url(#logoGrad)" letter-spacing="-0.5">AI</text>

  <!-- Text: mum -->
  <text x="122" y="33" font-family="'Segoe UI', Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#0F172A" letter-spacing="-0.5">mum</text>
</svg>
